<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - LMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .success-container {
            max-width: 500px;
            width: 100%;
        }
        
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .details {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        
        .detail-row {
            margin-bottom: 10px;
        }
        
        .detail-label {
            font-weight: bold;
            color: #333;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #6772e5;
            color: white;
            border: none;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
        }
        
        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        .email-note {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1>Payment Successful!</h1>
            <p>Thank you for your purchase. Your access has been granted.</p>
            
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">Session ID:</span>
                    <span>{{ session_id[:20] if session_id else 'N/A' }}...</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status:</span>
                    <span style="color: #28a745;">Completed</span>
                </div>
            </div>
            
            <div class="buttons">
                <a href="/dashboard" class="btn btn-primary">Browse More Courses</a>
                <a href="/" class="btn btn-secondary">Go to Home</a>
            </div>
            
            <div class="email-note">
                📧 A confirmation email has been sent to your registered email address.
            </div>
        </div>
    </div>
</body>
</html>
